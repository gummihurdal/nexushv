version: "3.9"

services:
  nexushv-api:
    build: .
    container_name: nexushv-api
    ports:
      - "8080:8080"
    volumes:
      - nexushv-data:/app/data
      - nexushv-logs:/app/logs
    environment:
      - NEXUSHV_JWT_SECRET=${NEXUSHV_JWT_SECRET:-change-me-in-production}
      - NEXUSHV_HA_URL=http://nexushv-ha:8081
    restart: unless-stopped
    depends_on:
      - nexushv-ha
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  nexushv-ha:
    build: .
    container_name: nexushv-ha
    command: python3 ha/nexushv_ha.py --standalone --port 8081
    ports:
      - "8081:8081"
    volumes:
      - nexushv-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    container_name: nexushv-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  nexushv-data:
  nexushv-logs:
  ollama-data:
