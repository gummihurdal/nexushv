name: NexusHV CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run tests
        run: |
          python -m pytest tests/test_api.py -v --tb=short

      - name: Check API imports
        run: |
          cd api && python -c "from nexushv_api import app; print('API imports OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python -m py_compile api/nexushv_api.py
          python -m py_compile ha/nexushv_ha.py
          python -m py_compile ai/nexushv_ai_local.py
          echo "All files compile successfully"

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        working-directory: ui
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          test -f ui/dist/index.html
          echo "Frontend build successful"
